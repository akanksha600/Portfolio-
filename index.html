<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akanksha Omane | Portfolio</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bg 15s infinite;
color:white;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.cursor{
position:fixed;width:15px;height:15px;border-radius:50%;
background:cyan;pointer-events:none;
box-shadow:0 0 20px cyan,0 0 40px cyan;
}

nav{
display:flex;justify-content:space-between;
padding:15px;background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.logo{color:cyan}

nav button{
background:none;border:none;color:white;margin:0 10px;cursor:pointer
}

.section{display:none;padding:40px}
.active{display:block}

.card{
background:rgba(255,255,255,0.1);
padding:25px;border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 20px cyan;
max-width:700px;margin:auto
}

.center{text-align:center}

.profile{width:150px;border-radius:50%;border:3px solid cyan}

.glow-btn{
padding:10px 20px;border:none;background:black;color:white;
box-shadow:0 0 10px cyan,0 0 40px cyan;
cursor:pointer;margin-top:10px
}

.skill{margin:10px 0}
.bar{background:#333;height:10px;border-radius:5px}
.bar div{background:cyan;height:10px;border-radius:5px}

.project{
padding:10px;margin:10px 0;border:1px solid cyan;border-radius:10px
}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.grid img{width:100%;cursor:pointer}

#modal{display:none;position:fixed;width:100%;height:100%;background:black;justify-content:center;align-items:center}
#modal img{max-width:80%}

.toggle{position:fixed;top:10px;right:20px;cursor:pointer}

.light{background:white;color:black}
.light .card{background:#eee;color:black}
</style></head>
<body><div class="cursor"></div>
<div class="toggle" onclick="toggleMode()">🌙</div><nav>
<h2 class="logo">AO</h2>
<div>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('about')">About</button>
<button onclick="showSection('skills')">Skills</button>
<button onclick="showSection('projects')">Projects</button>
<button onclick="showSection('gallery')">Gallery</button>
<button onclick="showSection('contact')">Contact</button>
</div>
</nav><section id="home" class="section active">
<div class="card center">
<img src="assets/photo.jpg" class="profile">
<h1>Akanksha Omane</h1>
<p>MIT VPU University</p>
<p class="typing"></p>
<button class="glow-btn">Explore</button>
</div>
</section><section id="about" class="section">
<div class="card">
<h2>About Me</h2>
<p>I am passionate about coding, AI, and modern web design.</p>
</div>
</section><section id="skills" class="section">
<div class="card">
<h2>Skills</h2>
<div class="skill"><p>HTML</p><div class="bar"><div style="width:90%"></div></div></div>
<div class="skill"><p>CSS</p><div class="bar"><div style="width:85%"></div></div></div>
<div class="skill"><p>JavaScript</p><div class="bar"><div style="width:75%"></div></div></div>
</div>
</section><section id="projects" class="section">
<div class="card">
<h2>Projects</h2>
<div class="project">AI Project</div>
<div class="project">Design Thinking</div>
<div class="project">Portfolio Website</div>
</div>
</section><section id="gallery" class="section">
<div class="card grid">
<h2>Gallery</h2>
<img src="assets/photo.jpg" onclick="openModal(this.src)">
<img src="assets/photo.jpg" onclick="openModal(this.src)">
<img src="assets/photo.jpg" onclick="openModal(this.src)">
</div>
</section><section id="contact" class="section">
<div class="card">
<h2>Contact</h2>
<p>Email: your@email.com</p>
<p>GitHub: yourlink</p>
</div>
</section><div id="modal" onclick="closeModal()">
<img id="modalImg">
</div><script>
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleMode(){
document.body.classList.toggle('light');
}

function openModal(src){
modal.style.display='flex';
document.getElementById('modalImg').src=src;
}

function closeModal(){
modal.style.display='none';
}

// cursor animation
document.addEventListener('mousemove',e=>{
let c=document.querySelector('.cursor');
c.style.top=e.clientY+'px';
c.style.left=e.clientX+'px';
});

// typing animation
const text="Web Developer | AI Enthusiast | Student";
let i=0;
function typing(){
if(i<text.length){
document.querySelector('.typing').innerHTML+=text[i];
i++;setTimeout(typing,40);
}}
typing();
</script></body>
</html>
